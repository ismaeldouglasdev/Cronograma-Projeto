# ============================================
# Cronograma - Docker Compose (Development)
# ============================================
# Uso:
#   docker-compose up --build
# ============================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: cronograma-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ../icon_images:/app/icon_images
      - ./app/cronograma.db:/app/cronograma.db
    environment:
      - DATABASE_URL=sqlite:///./cronograma.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

